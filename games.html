<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronikusu - Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: url('cinna.jpg') center/cover repeat;
        }

        header {
            background-color: rgba(51, 51, 100, 0.8);
            color: white;
            text-align: center;
            padding: 0.5em;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            margin-bottom: 60px; /* Add margin to the bottom of the header */
        }

        header img {
            width: 40px; /* Set the width of the image as needed */
            height: auto; /* Maintain aspect ratio */
            border-radius: 50%; /* Optional: Apply border-radius for a circular image */
        }

        header h1 {
            margin-bottom: 0.2em; /* Adjust spacing between image and heading */
            font-size: 1.5em; /* Adjust font size */
        }

        section {
            max-width: 1000px;
            margin: 7em auto;
            padding: 1em;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1, h2 {
            color: #333;
        }

        p {
            line-height: 1.6;
            color: #666;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        .button-container {
            text-align: center;
            margin-top: 1em;
        }

        .want-one-button {
            background-color: #274;
            color: bubblegum;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .want-one-button:hover {
            background-color: #555;
        }

        footer {
            text-align: center;
            padding: 1em;
            background-color: rgba(51, 51, 100, 0.8);
            color: white;
        }
    </style>
</head>
<body>

        <img src="header.jpg" alt="Ronikusu">
